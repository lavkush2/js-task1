<!DOCTYPE html>
<html>
<head>
    <title>Tabs System</title>
    <link rel="stylesheet" href="index16.css">
</head>
<body>

    <div class="container">

        <h1>My Skills</h1>

        <div class="tabs">

            <button id="htmlBtn" class="active">
                HTML
            </button>

            <button id="cssBtn">
                CSS
            </button>

            <button id="jsBtn">
                JavaScript
            </button>

        </div>

        <div id="content">

            <p id="htmlContent">
                HTML is used to create the structure of a webpage.
            </p>

            <p id="cssContent" class="hidden">
                CSS is used to style a webpage.
            </p>

            <p id="jsContent" class="hidden">
                JavaScript is used to add functionality.
            </p>

        </div>

    </div>

    <script src="indx16.js"></script>

</body>
</html>
